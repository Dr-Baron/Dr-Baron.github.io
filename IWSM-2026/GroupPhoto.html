<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>IWSM 2026 Group Photo</title>

<style>
.photo-container{
    position:relative;
    display:inline-block;
}

.photo-container img{
    max-width:100%;
}

.person{
    position:absolute;
    width:20px;
    height:20px;

    border-radius:50%;
    background:rgba(255,0,0,0.4);
    cursor:pointer;
}
</style>
</head>

<body>

<h2>IWSM 2026 Group Photo</h2>

<div class="photo-container">

<img src="IWSM Group Photo.jpg">

<div class="person"
     style="left:41%;top:52%;"
     title="Alexander Tartakovsky"></div>

<div class="person"
     style="left:46%;top:49%;"
     title="Andrew Rukhin"></div>

</div>

</body>
</html>
